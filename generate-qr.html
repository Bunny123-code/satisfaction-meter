<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Satisfaction Meter – QR Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #4f46e5; --primary-dark: #3730a3; --primary-light: #eef2ff;
      --bg: #f1f5f9; --card: #fff; --text: #1e293b; --muted: #64748b; --border: #e2e8f0;
      --radius: 16px;
    }
    body {
      min-height: 100dvh;
      background: linear-gradient(135deg, #3730a3 0%, #4f46e5 50%, #7c3aed 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
    }
    .card {
      background: var(--card); border-radius: 22px;
      width: 100%; max-width: 540px;
      padding: 40px 34px;
      box-shadow: 0 20px 60px rgba(0,0,0,.22);
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, #4f46e5, #7c3aed, #a855f7);
    }
    .logo { font-size: 38px; margin-bottom: 14px; }
    h1 { font-size: 23px; font-weight: 800; color: var(--text); margin-bottom: 5px; }
    .sub { font-size: 14px; color: var(--muted); margin-bottom: 30px; line-height: 1.5; }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing:.07em; margin-bottom: 6px;
    }
    .form-group input {
      width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
      border-radius: 11px; font-size: 14px; font-family: inherit;
      outline: none; transition: border-color .18s, box-shadow .18s;
    }
    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,.1);
    }

    .url-preview {
      background: var(--primary-light); border: 1px solid #c7d2fe;
      border-radius: 10px; padding: 11px 14px;
      font-size: 12px; color: var(--primary); font-family: monospace;
      word-break: break-all; margin-bottom: 22px; font-weight: 600;
      min-height: 42px; line-height: 1.5;
    }

    .size-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 18px; flex-wrap: wrap; }
    .size-btn {
      padding: 8px 16px; border: 1.5px solid var(--border); border-radius: 10px;
      background: #fff; color: var(--text); font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all .18s;
    }
    .size-btn:hover { border-color: var(--primary); color: var(--primary); }
    .size-btn.active {
      border-color: var(--primary); background: var(--primary); color: #fff;
      box-shadow: 0 3px 10px rgba(79,70,229,.28);
    }

    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 13px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: opacity .18s, transform .15s, box-shadow .18s;
      margin-bottom: 12px;
    }
    .btn:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: scale(.98); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .btn-generate {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: #fff; box-shadow: 0 4px 14px rgba(79,70,229,.35);
    }
    .btn-download {
      background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
      color: #fff; box-shadow: 0 4px 14px rgba(22,163,74,.3);
    }

    .qr-section { display: none; text-align: center; padding-top: 10px; }
    .qr-wrapper {
      display: inline-block; padding: 18px; background: #fff;
      border: 2px solid var(--border); border-radius: 16px; margin-bottom: 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
    }
    .qr-wrapper canvas { display: block; border-radius: 4px; }
    .store-label { font-size: 14px; font-weight: 800; margin-bottom: 5px; color: var(--text); }
    .store-url { font-size: 11px; color: var(--muted); word-break: break-all; margin-bottom: 20px; font-family: monospace; }

    .print-card {
      border: 2px dashed var(--border); border-radius: 14px; padding: 22px;
      text-align: center; margin-top: 14px; background: #fafafa;
    }
    .print-card strong { font-size: 14px; }
    .print-card p { font-size: 13px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
    .print-btn {
      background: #fff; border: 1.5px solid var(--border); color: var(--text);
      font-size: 13px; font-weight: 700; padding: 9px 20px; border-radius: 10px;
      cursor: pointer; margin-top: 12px; transition: all .18s;
    }
    .print-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

    @media print {
      body { background: #fff; display: block; }
      .card { box-shadow: none; max-width: 100%; border-radius: 0; padding: 10mm; }
      .form-section, .btn-generate { display: none !important; }
      .qr-section { display: block !important; }
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">📱</div>
  <h1>QR Code Generator</h1>
  <p class="sub">Generate a scan-to-rate QR code for each store location.</p>

  <div class="form-section">
    <div class="form-group">
      <label>Store ID *</label>
      <input type="text" id="store-id" placeholder="e.g. store_001" oninput="updatePreview()" />
    </div>
    <div class="form-group">
      <label>Store Name (for label)</label>
      <input type="text" id="store-name" placeholder="e.g. Al Madina Bakery" oninput="updatePreview()" />
    </div>

    <!-- Base URL is hardcoded – no user input needed -->
    <div class="url-preview" id="url-preview">Enter a Store ID above to preview the URL…</div>

    <div class="size-row">
      <button class="size-btn" data-size="200" onclick="setSize(200)">Small (200px)</button>
      <button class="size-btn active" data-size="300" onclick="setSize(300)">Medium (300px)</button>
      <button class="size-btn" data-size="400" onclick="setSize(400)">Large (400px)</button>
    </div>

    <button class="btn btn-generate" id="gen-btn" onclick="generateQR()" disabled>Generate QR Code</button>
  </div>

  <div class="qr-section" id="qr-section">
    <div class="qr-wrapper">
      <canvas id="qr-canvas"></canvas>
    </div>
    <div class="store-label" id="qr-store-name">Store Name</div>
    <div class="store-url"   id="qr-url-display">URL</div>
    <button class="btn btn-download" onclick="downloadQR()">⬇️ Download QR as PNG</button>
    <div class="print-card">
      <strong>🖨️ Print this QR Code</strong>
      <p>Place at your checkout counter, store entrance, or fitting room so customers can scan and leave feedback.</p>
      <button class="print-btn" onclick="window.print()">🖨️ Print</button>
    </div>
  </div>
</div>

<script>
  const BASE_URL = 'https://bunny123-code.github.io/satisfaction-meter/index.html';
  let qrSize = 300;

  function updatePreview() {
    const storeId = document.getElementById('store-id').value.trim();
    const btn     = document.getElementById('gen-btn');
    if (storeId) {
      const url = `${BASE_URL}?store=${encodeURIComponent(storeId)}`;
      document.getElementById('url-preview').textContent = url;
      btn.disabled = false;
    } else {
      document.getElementById('url-preview').textContent = 'Enter a Store ID above to preview the URL…';
      btn.disabled = true;
    }
  }

  function setSize(size) {
    qrSize = size;
    document.querySelectorAll('.size-btn').forEach(b =>
      b.classList.toggle('active', Number(b.dataset.size) === size));
    if (document.getElementById('qr-section').style.display === 'block') generateQR();
  }

  function generateQR() {
    const storeId   = document.getElementById('store-id').value.trim();
    const storeName = document.getElementById('store-name').value.trim() || storeId;
    if (!storeId) return;

    const url      = `${BASE_URL}?store=${encodeURIComponent(storeId)}`;
    const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${qrSize}x${qrSize}&data=${encodeURIComponent(url)}`;

    const canvas = document.getElementById('qr-canvas');
    const img    = new Image();
    img.crossOrigin = 'Anonymous';
    img.onload = () => {
      canvas.width  = qrSize;
      canvas.height = qrSize;
      canvas.getContext('2d').drawImage(img, 0, 0, qrSize, qrSize);
      document.getElementById('qr-store-name').textContent = storeName;
      document.getElementById('qr-url-display').textContent = url;
      document.getElementById('qr-section').style.display = 'block';
    };
    img.onerror = () => alert('QR generation failed. Check your internet connection and try again.');
    img.src = qrApiUrl;
  }

  function downloadQR() {
    const canvas    = document.getElementById('qr-canvas');
    const storeName = document.getElementById('store-name').value.trim() ||
                      document.getElementById('store-id').value.trim() || 'qrcode';
    const link      = document.createElement('a');
    link.href       = canvas.toDataURL('image/png');
    link.download   = `qr-${storeName.replace(/\s+/g,'_')}.png`;
    link.click();
  }
</script>
</body>
</html>
