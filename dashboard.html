<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Satisfaction Meter – Dashboard</title>
  <link rel="manifest" href="/satisfaction-meter/manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/satisfaction-meter/icons/icon-192.png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    /* === styles (same as your working version – no changes) === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #4f46e5; --primary-dark: #3730a3; --primary-light:#eef2ff;
      --happy: #16a34a; --neutral: #d97706; --unhappy: #dc2626;
      --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --muted: #64748b;
      --border: #e2e8f0; --radius: 16px;
      --shadow: 0 2px 16px rgba(0,0,0,.07);
      --shadow-hover: 0 8px 28px rgba(79,70,229,.14);
      --header-h: 64px;
    }
    body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: var(--text); }
    #auth-screen { min-height: 100dvh; background: linear-gradient(135deg, #3730a3 0%, #4f46e5 50%, #7c3aed 100%); display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-card { background: #fff; border-radius: 22px; padding: 44px 36px; width: 100%; max-width: 390px; box-shadow: 0 20px 60px rgba(0,0,0,.22); text-align: center; position: relative; overflow: hidden; }
    .auth-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #4f46e5, #7c3aed, #a855f7); }
    .auth-card .logo { font-size: 44px; margin-bottom: 14px; }
    .auth-card h1 { font-size: 23px; font-weight: 800; margin-bottom: 4px; }
    .auth-card .sub { font-size: 14px; color: var(--muted); margin-bottom: 30px; }
    .form-group { text-align: left; margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 11px; font-size: 14px; font-family: inherit; outline: none; transition: border-color .18s, box-shadow .18s; }
    .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.1); }
    .auth-btn { width: 100%; padding: 13px; border: none; border-radius: 12px; background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity .18s, transform .15s; margin-top: 4px; box-shadow: 0 4px 14px rgba(79,70,229,.35); }
    .auth-btn:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .auth-error { background: #fef2f2; border: 1px solid #fecaca; border-radius: 9px; padding: 10px 13px; color: var(--unhappy); font-size: 13px; font-weight: 500; margin-bottom: 16px; display: none; text-align: left; }
    #app-screen { display: none; min-height: 100dvh; }
    header { position: sticky; top: 0; z-index: 100; background: #fff; border-bottom: 1px solid var(--border); height: var(--header-h); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; box-shadow: 0 1px 8px rgba(0,0,0,.07); }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo { width: 38px; height: 38px; background: linear-gradient(135deg, var(--primary-light) 0%, #ddd6fe 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 2px 8px rgba(79,70,229,.15); }
    .header-title { font-size: 16px; font-weight: 800; color: var(--text); }
    .header-store { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .logout-btn { padding: 8px 18px; border: 1.5px solid var(--border); border-radius: 9px; background: #fff; color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s; }
    .logout-btn:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
    main { max-width: 980px; margin: 0 auto; padding: 28px 18px 56px; }
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 26px; }
    .filter-btn { padding: 9px 18px; border: 1.5px solid var(--border); border-radius: 99px; background: #fff; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; transition: all .18s; }
    .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
    .filter-btn.active { border-color: var(--primary); background: var(--primary); color: #fff; box-shadow: 0 3px 10px rgba(79,70,229,.28); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 16px; margin-bottom: 26px; }
    .stat-card { background: var(--card); border-radius: var(--radius); padding: 22px 20px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 7px; transition: box-shadow .2s, transform .2s; border: 1px solid transparent; }
    .stat-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
    .stat-card .sc-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }
    .stat-card .sc-value { font-size: 34px; font-weight: 900; line-height: 1; }
    .stat-card .sc-pct { font-size: 13px; font-weight: 600; color: var(--muted); }
    .stat-card .sc-bar { height: 6px; border-radius: 99px; background: var(--border); margin-top: 4px; overflow: hidden; }
    .stat-card .sc-bar-fill { height: 100%; border-radius: 99px; transition: width .6s cubic-bezier(.4,0,.2,1); }
    .stat-card.happy .sc-value { color: var(--happy); }
    .stat-card.neutral .sc-value { color: var(--neutral); }
    .stat-card.unhappy .sc-value { color: var(--unhappy); }
    .stat-card.total .sc-value { color: var(--primary); }
    .stat-card.happy .sc-bar-fill { background: linear-gradient(90deg, #4ade80, var(--happy)); }
    .stat-card.neutral .sc-bar-fill { background: linear-gradient(90deg, #fcd34d, var(--neutral)); }
    .stat-card.unhappy .sc-bar-fill { background: linear-gradient(90deg, #f87171, var(--unhappy)); }
    .stat-card.total .sc-bar-fill { background: linear-gradient(90deg, #818cf8, var(--primary)); }
    .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 26px; }
    @media (max-width: 680px) { .panels { grid-template-columns: 1fr; } }
    .panel { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 22px; transition: box-shadow .2s; }
    .panel:hover { box-shadow: var(--shadow-hover); }
    .panel h2 { font-size: 14px; font-weight: 700; margin-bottom: 18px; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .chart-wrap { position: relative; height: 210px; }
    .recent-list { display: flex; flex-direction: column; gap: 10px; max-height: 340px; overflow-y: auto; }
    .recent-list::-webkit-scrollbar { width: 4px; }
    .recent-list::-webkit-scrollbar-track { background: transparent; }
    .recent-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    .recent-item { display: flex; align-items: flex-start; gap: 12px; padding: 13px; border: 1px solid var(--border); border-radius: 12px; transition: background .15s; }
    .recent-item:hover { background: #fafafa; border-color: #c7d2fe; }
    .recent-emoji { font-size: 26px; flex-shrink: 0; }
    .recent-info { flex: 1; min-width: 0; }
    .recent-comment { font-size: 13px; color: var(--text); margin-bottom: 4px; word-break: break-word; line-height: 1.5; }
    .recent-meta { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .mood-badge { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 99px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
    .mood-badge.happy { background: #dcfce7; color: var(--happy); }
    .mood-badge.neutral { background: #fef3c7; color: var(--neutral); }
    .mood-badge.unhappy { background: #fee2e2; color: var(--unhappy); }
    .loading-state, .empty-state { text-align: center; padding: 52px 24px; color: var(--muted); font-size: 14px; }
    .loading-state .spinner, .empty-state .icon { font-size: 38px; margin-bottom: 14px; display: block; }
    .spinner-inline { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #install-btn { position: fixed; bottom: 24px; right: 24px; background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff; border: none; border-radius: 50px; padding: 13px 22px; font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 18px rgba(79,70,229,.4); z-index: 1000; display: none; transition: transform .2s, box-shadow .2s; }
    #install-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(79,70,229,.5); }
  </style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="logo">⭐</div>
    <h1>Dashboard Login</h1>
    <p class="sub">Sign in to view your store's satisfaction data</p>
    <div class="auth-error" id="auth-error"></div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="owner@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="auth-btn" id="login-btn" onclick="handleLogin()">Sign In</button>
  </div>
</div>

<div id="app-screen">
  <header>
    <div class="header-left">
      <div class="header-logo">⭐</div>
      <div><div class="header-title">Satisfaction Meter</div><div class="header-store" id="header-store">Loading…</div></div>
    </div>
    <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
  </header>
  <main>
    <div class="filter-bar">
      <button class="filter-btn active" data-range="today" onclick="setRange('today')">Today</button>
      <button class="filter-btn" data-range="yesterday" onclick="setRange('yesterday')">Yesterday</button>
      <button class="filter-btn" data-range="7days" onclick="setRange('7days')">Last 7 Days</button>
      <button class="filter-btn" data-range="30days" onclick="setRange('30days')">Last 30 Days</button>
    </div>
    <div class="stats-grid">
      <div class="stat-card total"><div class="sc-label">Total Responses</div><div class="sc-value" id="stat-total">–</div><div class="sc-pct" id="stat-period">–</div><div class="sc-bar"><div class="sc-bar-fill" id="bar-total" style="width:100%"></div></div></div>
      <div class="stat-card happy"><div class="sc-label">😊 Happy</div><div class="sc-value" id="stat-happy">–</div><div class="sc-pct" id="pct-happy">–</div><div class="sc-bar"><div class="sc-bar-fill" id="bar-happy" style="width:0%"></div></div></div>
      <div class="stat-card neutral"><div class="sc-label">😐 Neutral</div><div class="sc-value" id="stat-neutral">–</div><div class="sc-pct" id="pct-neutral">–</div><div class="sc-bar"><div class="sc-bar-fill" id="bar-neutral" style="width:0%"></div></div></div>
      <div class="stat-card unhappy"><div class="sc-label">😠 Unhappy</div><div class="sc-value" id="stat-unhappy">–</div><div class="sc-pct" id="pct-unhappy">–</div><div class="sc-bar"><div class="sc-bar-fill" id="bar-unhappy" style="width:0%"></div></div></div>
    </div>
    <div class="panels">
      <div class="panel"><h2>📈 Satisfaction by Hour <span class="tag">LIVE</span></h2><div class="chart-wrap"><canvas id="hourly-chart"></canvas></div></div>
      <div class="panel"><h2>🕐 Recent Feedback</h2><div id="recent-list" class="recent-list"><div class="loading-state"><span class="spinner">⏳</span>Loading feedback…</div></div></div>
    </div>
  </main>
</div>

<button id="install-btn">📲 Install App</button>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, collection, query, where, orderBy, limit, getDocs, Timestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyA9kH3rpz8Zaf40lXd_SGhiKlkk2oiMCVo",
    authDomain: "mall-mood-meter.firebaseapp.com",
    projectId: "mall-mood-meter",
    storageBucket: "mall-mood-meter.firebasestorage.app",
    messagingSenderId: "261002684409",
    appId: "1:261002684409:web:4b2151b76f38b76b333f28",
    measurementId: "G-J9L41YFQML"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let currentStore = null;
  let activeRange = 'today';
  let hourlyChart = null;

  window.handleLogin = handleLogin;
  window.handleLogout = handleLogout;
  window.setRange = setRange;

  // Email validation regex (supports standard emails, including admin@moodmeter.com)
  function isValidEmail(email) {
    const re = /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/;
    return re.test(email);
  }

  onAuthStateChanged(auth, async user => {
    if (user) {
      currentUser = user;
      await loadStoreForUser(user.uid);
      showApp();
      loadDashboard();
    } else {
      currentUser = null;
      currentStore = null;
      showAuth();
    }
  });

  async function loadStoreForUser(uid) {
    try {
      const snap = await getDocs(query(collection(db, 'stores'), where('ownerId', '==', uid)));
      currentStore = snap.empty ? null : { storeId: snap.docs[0].id, ...snap.docs[0].data() };
    } catch (e) { console.error(e); currentStore = null; }
    document.getElementById('header-store').textContent = currentStore ? `${currentStore.storeName}${currentStore.mallName ? ' · ' + currentStore.mallName : ''}` : 'No store assigned';
  }

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('auth-error');
    errEl.style.display = 'none';
    if (!email || !pass) { showAuthError('Please enter email and password.'); return; }
    if (!isValidEmail(email)) { showAuthError('Please enter a valid email address (e.g., name@example.com).'); return; }
    if (pass.length < 4) { showAuthError('Password must be at least 4 characters.'); return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-inline"></span>Signing in…';
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch (err) {
      let msg = 'Login failed. Please check your credentials.';
      if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential')
        msg = 'Invalid email or password.';
      if (err.code === 'auth/too-many-requests') msg = 'Too many attempts. Please wait a few minutes.';
      showAuthError(msg);
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Sign In';
    }
  }

  async function handleLogout() { await signOut(auth); }
  function showAuthError(msg) { const el = document.getElementById('auth-error'); el.textContent = msg; el.style.display = 'block'; }
  function showApp() { document.getElementById('auth-screen').style.display = 'none'; document.getElementById('app-screen').style.display = 'block'; }
  function showAuth() { document.getElementById('auth-screen').style.display = 'flex'; document.getElementById('app-screen').style.display = 'none'; }
  function setRange(range) { activeRange = range; document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.range === range)); loadDashboard(); }
  function getRangeBounds(range) {
    const now = new Date(); const start = new Date(now);
    if (range === 'yesterday') { start.setDate(start.getDate()-1); start.setHours(0,0,0,0); const end = new Date(start); end.setHours(23,59,59,999); return { start: Timestamp.fromDate(start), end: Timestamp.fromDate(end) }; }
    if (range === '7days') start.setDate(start.getDate()-7);
    if (range === '30days') start.setDate(start.getDate()-30);
    start.setHours(0,0,0,0);
    return { start: Timestamp.fromDate(start), end: Timestamp.fromDate(now) };
  }
  function rangeLabel(range) { return { today:'Today', yesterday:'Yesterday', '7days':'Last 7 Days', '30days':'Last 30 Days' }[range]; }
  async function loadDashboard() {
    if (!currentStore) { setStatsEmpty(); document.getElementById('recent-list').innerHTML = '<div class="empty-state"><span class="icon">🏪</span>No store assigned to your account. Contact admin.</div>'; return; }
    const { start, end } = getRangeBounds(activeRange);
    let moods = [];
    try {
      const snap = await getDocs(query(collection(db,'moods'), where('storeId','==',currentStore.storeId), where('timestamp','>=',start), where('timestamp','<=',end), orderBy('timestamp','desc'), limit(500)));
      moods = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    } catch(e) { console.error(e); }
    renderStats(moods);
    renderHourlyChart(moods);
    renderRecentList(moods.slice(0,50));
  }
  function renderStats(moods) {
    const total = moods.length, happy = moods.filter(m=>m.mood==='happy').length, neutral = moods.filter(m=>m.mood==='neutral').length, unhappy = moods.filter(m=>m.mood==='unhappy').length;
    const pct = n => total ? Math.round((n/total)*100) : 0;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-happy').textContent = happy;
    document.getElementById('stat-neutral').textContent = neutral;
    document.getElementById('stat-unhappy').textContent = unhappy;
    document.getElementById('stat-period').textContent = rangeLabel(activeRange);
    document.getElementById('pct-happy').textContent = `${pct(happy)}% of responses`;
    document.getElementById('pct-neutral').textContent = `${pct(neutral)}% of responses`;
    document.getElementById('pct-unhappy').textContent = `${pct(unhappy)}% of responses`;
    document.getElementById('bar-happy').style.width = `${pct(happy)}%`;
    document.getElementById('bar-neutral').style.width = `${pct(neutral)}%`;
    document.getElementById('bar-unhappy').style.width = `${pct(unhappy)}%`;
  }
  function setStatsEmpty() { ['stat-total','stat-happy','stat-neutral','stat-unhappy'].forEach(id => document.getElementById(id).textContent = '–'); }
  function renderHourlyChart(moods) {
    const happyArr = Array(24).fill(0), neutralArr = Array(24).fill(0), unhappyArr = Array(24).fill(0);
    moods.forEach(m => { if (!m.timestamp) return; const h = m.timestamp.toDate().getHours(); if (m.mood==='happy') happyArr[h]++; if (m.mood==='neutral') neutralArr[h]++; if (m.mood==='unhappy') unhappyArr[h]++; });
    const labels = Array.from({length:24}, (_,h) => { const s = h<12?'am':'pm'; const l = h===0?12:h>12?h-12:h; return `${l}${s}`; });
    const ctx = document.getElementById('hourly-chart').getContext('2d');
    if (hourlyChart) hourlyChart.destroy();
    hourlyChart = new Chart(ctx, { type:'bar', data:{ labels, datasets:[{ label:'Happy', data:happyArr, backgroundColor:'#bbf7d0', borderColor:'#16a34a', borderWidth:1.5, borderRadius:5 }, { label:'Neutral', data:neutralArr, backgroundColor:'#fde68a', borderColor:'#d97706', borderWidth:1.5, borderRadius:5 }, { label:'Unhappy', data:unhappyArr, backgroundColor:'#fecaca', borderColor:'#dc2626', borderWidth:1.5, borderRadius:5 }] }, options:{ responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false}, plugins:{ legend:{ position:'bottom', labels:{ font:{size:11}, boxWidth:12, padding:16 } } }, scales:{ x:{ stacked:true, ticks:{font:{size:9},maxRotation:45}, grid:{display:false} }, y:{ stacked:true, beginAtZero:true, ticks:{font:{size:11},stepSize:1}, grid:{color:'#f1f5f9'} } } } });
  }
  function renderRecentList(moods) {
    const el = document.getElementById('recent-list');
    if (!moods.length) { el.innerHTML = '<div class="empty-state"><span class="icon">📭</span>No feedback in this period.</div>'; return; }
    const emojiMap = { happy:'😊', neutral:'😐', unhappy:'😠' };
    el.innerHTML = moods.map(m => { const ts = m.timestamp ? m.timestamp.toDate() : new Date(); return `<div class="recent-item"><div class="recent-emoji">${emojiMap[m.mood]||'❓'}</div><div class="recent-info"><div class="recent-comment">${m.comment ? escHtml(m.comment) : '<em style="color:var(--muted)">No comment</em>'}</div><div class="recent-meta"><span class="mood-badge ${m.mood}">${m.mood}</span> ${formatTime(ts)}</div></div></div>`; }).join('');
  }
  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function formatTime(d) { return d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true}); }

  document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') handleLogin(); });
</script>

<script>
  let deferredPrompt;
  const installBtn = document.getElementById('install-btn');
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'block';
    installBtn.onclick = () => {
      installBtn.style.display = 'none';
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
    };
  });
  setTimeout(() => {
    if (installBtn.style.display !== 'block') {
      installBtn.style.display = 'block';
      installBtn.innerText = '📲 Add to Home Screen (Manual)';
      installBtn.onclick = () => {
        alert('On Android: Tap menu (three dots) → "Add to Home Screen". On iOS: Share icon → "Add to Home Screen".');
      };
    }
  }, 3000);
</script>
</body>
</html>
