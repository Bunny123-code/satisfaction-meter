<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Satisfaction Meter – Admin</title>
  <style>
    /* === keep your existing styles (no changes needed) === */
    /* I'll include the same styles as your current admin.html for consistency */
    /* For brevity, I'll assume you have the full styles; you can reuse yours. */
  </style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="logo">🛡️</div>
    <h1>Admin Panel</h1>
    <p class="sub">Authorized personnel only</p>
    <div class="auth-error" id="auth-error"></div>
    <div class="form-group">
      <label>Admin Email</label>
      <input type="email" id="email" placeholder="admin@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="auth-btn" id="login-btn" onclick="handleLogin()">Sign In as Admin</button>
  </div>
</div>

<div id="app-screen">
  <!-- your existing admin app screen (unchanged) -->
  <!-- keep all tabs, forms, tables, etc. -->
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, collection, query, where, orderBy, limit, getDocs, doc, setDoc, deleteDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyA9kH3rpz8Zaf40lXd_SGhiKlkk2oiMCVo",
    authDomain: "mall-mood-meter.firebaseapp.com",
    projectId: "mall-mood-meter",
    storageBucket: "mall-mood-meter.firebasestorage.app",
    messagingSenderId: "261002684409",
    appId: "1:261002684409:web:4b2151b76f38b76b333f28",
    measurementId: "G-J9L41YFQML"
  };

  // Your admin UID
  const ADMIN_UIDS = ["9OMBEYo9DVVuQwF4VjG5qMps6E83"];

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let activeTab = 'overview';
  let pendingDelete = null;

  window.handleLogin = handleLogin;
  window.handleLogout = handleLogout;
  window.switchTab = switchTab;
  window.addStore = addStore;
  window.deleteStore = deleteStore;
  window.closeModal = closeModal;
  window.loadStores = loadStores;
  window.loadAllFeedback = loadAllFeedback;
  window.resetStoreData = resetStoreData;

  function isValidEmail(email) {
    const re = /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/;
    return re.test(email);
  }

  onAuthStateChanged(auth, user => {
    if (user && ADMIN_UIDS.includes(user.uid)) {
      currentUser = user; showApp(); loadOverview();
    } else if (user) {
      signOut(auth); showAuth(); showAuthError('Access denied. You are not an admin.');
    } else {
      currentUser = null; showAuth();
    }
  });

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');
    document.getElementById('auth-error').style.display = 'none';
    if (!email || !pass) { showAuthError('Enter email and password.'); return; }
    if (!isValidEmail(email)) { showAuthError('Please enter a valid email address.'); return; }
    if (pass.length < 4) { showAuthError('Password must be at least 4 characters.'); return; }
    btn.disabled = true; btn.textContent = 'Signing in…';
    try { await signInWithEmailAndPassword(auth, email, pass); }
    catch(e) { showAuthError('Invalid credentials or access denied.'); btn.disabled = false; btn.textContent = 'Sign In as Admin'; }
  }

  async function handleLogout() { await signOut(auth); }
  function showAuthError(msg) { const el = document.getElementById('auth-error'); el.textContent = msg; el.style.display = 'block'; }
  function showApp() { document.getElementById('auth-screen').style.display = 'none'; document.getElementById('app-screen').style.display = 'block'; }
  function showAuth() { document.getElementById('auth-screen').style.display = 'flex'; document.getElementById('app-screen').style.display = 'none'; }
  function switchTab(tab) { activeTab = tab; document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab)); document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id===`tab-${tab}`)); if (tab==='stores') loadStores(); if (tab==='feedback') loadAllFeedback(); if (tab==='overview') loadOverview(); }
  async function loadOverview() { try { const storesSnap = await getDocs(collection(db,'stores')); const moodsSnap = await getDocs(query(collection(db,'moods'), orderBy('timestamp','desc'), limit(2000))); const moods = moodsSnap.docs.map(d=>d.data()); document.getElementById('ov-stores').textContent = storesSnap.size; document.getElementById('ov-total').textContent = moods.length; document.getElementById('ov-happy').textContent = moods.filter(m=>m.mood==='happy').length; document.getElementById('ov-neutral').textContent = moods.filter(m=>m.mood==='neutral').length; document.getElementById('ov-unhappy').textContent = moods.filter(m=>m.mood==='unhappy').length; document.getElementById('ov-loading').style.display='none'; } catch(e){console.error(e);} }
  async function loadStores() { const tbody = document.getElementById('stores-tbody'); tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Loading…</td></tr>'; try { const snap = await getDocs(collection(db,'stores')); const stores = snap.docs.map(d=>({id:d.id,...d.data()})); if (!stores.length) { tbody.innerHTML='<tr><td colspan="6" class="empty-state">No stores yet. Add one above.</td></tr>'; return; } const moodCountsP = stores.map(s => getDocs(query(collection(db,'moods'),where('storeId','==',s.id))).then(q=>({id:s.id, docs:q.docs.map(d=>d.data())}))); const moodResults = await Promise.all(moodCountsP); const countsMap = {}; moodResults.forEach(r=>{countsMap[r.id]=r.docs;}); tbody.innerHTML = stores.map(s=>{ const moods = countsMap[s.id]||[]; const happy = moods.filter(m=>m.mood==='happy').length; const neutral = moods.filter(m=>m.mood==='neutral').length; const unhappy = moods.filter(m=>m.mood==='unhappy').length; return `<tr><td><span class="store-id-badge">${escHtml(s.id)}</span></td><td>${escHtml(s.storeName||'–')}</td><td>${escHtml(s.mallName||'–')}</td><td>${escHtml(s.ownerEmail||'–')}</td><td><div class="mood-pills"><span class="pill happy">😊 ${happy}</span><span class="pill neutral">😐 ${neutral}</span><span class="pill unhappy">😠 ${unhappy}</span></div></td><td><div class="action-btns"><button class="btn btn-outline btn-sm" onclick="resetStoreData('${escHtml(s.id)}')">Reset</button><button class="btn btn-danger btn-sm" onclick="deleteStore('${escHtml(s.id)}','${escHtml(s.storeName||s.id)}')">Delete</button></div></td></tr>`; }).join(''); } catch(e) { console.error(e); tbody.innerHTML='<tr><td colspan="6">Error loading stores.</td></tr>'; } }
  async function addStore() { const storeId = document.getElementById('f-storeId').value.trim().replace(/\s+/g,'_'); const storeName = document.getElementById('f-storeName').value.trim(); const mallName = document.getElementById('f-mallName').value.trim(); const ownerEmail = document.getElementById('f-ownerEmail').value.trim(); const ownerId = document.getElementById('f-ownerId').value.trim(); const msg = document.getElementById('add-msg'); const btn = document.getElementById('add-store-btn'); msg.className='form-msg'; msg.style.display='none'; if (!storeId||!storeName||!ownerEmail||!ownerId) { msg.textContent='Please fill in all required fields (*).'; msg.className='form-msg error'; return; } if (!/^[a-zA-Z0-9_-]+$/.test(storeId)) { msg.textContent='Store ID can only contain letters, numbers, _ and -.'; msg.className='form-msg error'; return; } btn.disabled=true; btn.textContent='Adding…'; try { await setDoc(doc(db,'stores',storeId),{storeName,mallName,ownerEmail,ownerId,createdAt:serverTimestamp()}); msg.textContent=`Store "${storeName}" added! QR URL: ${location.origin}/index.html?store=${storeId}`; msg.className='form-msg success'; ['f-storeId','f-storeName','f-mallName','f-ownerEmail','f-ownerId'].forEach(id=>document.getElementById(id).value=''); if (activeTab==='stores') loadStores(); } catch(e) { msg.textContent='Error: '+e.message; msg.className='form-msg error'; } finally { btn.disabled=false; btn.textContent='Add Store'; } }
  function deleteStore(storeId, storeName) { pendingDelete = storeId; document.getElementById('confirm-msg').textContent = `Delete store "${storeName}" (${storeId})? The store record will be removed. Response data will NOT be deleted automatically.`; document.getElementById('confirm-modal').classList.add('open'); document.getElementById('confirm-yes').onclick = async () => { closeModal(); try { await deleteDoc(doc(db,'stores',pendingDelete)); loadStores(); } catch(e) { alert('Delete failed: '+e.message); } }; }
  async function resetStoreData(storeId) { if (!confirm(`Delete ALL responses for store "${storeId}"? This cannot be undone.`)) return; try { const snap = await getDocs(query(collection(db,'moods'),where('storeId','==',storeId))); await Promise.all(snap.docs.map(d=>deleteDoc(doc(db,'moods',d.id)))); alert(`Deleted ${snap.size} responses for ${storeId}.`); loadStores(); } catch(e) { alert('Reset failed: '+e.message); } }
  function closeModal() { document.getElementById('confirm-modal').classList.remove('open'); pendingDelete=null; }
  async function loadAllFeedback() { const tbody = document.getElementById('feedback-tbody'); tbody.innerHTML = '<tr><td colspan="4" class="empty-state">Loading…</td></tr>'; try { const snap = await getDocs(query(collection(db,'moods'),orderBy('timestamp','desc'),limit(200))); const moods = snap.docs.map(d=>({id:d.id,...d.data()})); const emojiMap = {happy:'😊',neutral:'😐',unhappy:'😠'}; tbody.innerHTML = moods.map(m=>{ const ts = m.timestamp ? m.timestamp.toDate() : new Date(); return `<tr><td><span class="store-id-badge">${escHtml(m.storeId||'?')}</span></td><td><span class="pill ${m.mood}">${emojiMap[m.mood]||'?'} ${m.mood}</span></td><td>${m.comment ? escHtml(m.comment) : '<em style="color:var(--muted)">–</em>'}</td><td style="white-space:nowrap;font-size:12px">${formatTime(ts)}</td></tr>`; }).join(''); } catch(e) { tbody.innerHTML='<tr><td colspan="4">Error: '+e.message+'</td></tr>'; } }
  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function formatTime(d) { return d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true}); }

  document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') handleLogin(); });
</script>
</body>
</html>
